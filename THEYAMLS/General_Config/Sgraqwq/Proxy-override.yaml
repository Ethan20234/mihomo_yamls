  - PROCESS-NAME,Navicat.exe,DIRECT
  - PROCESS-NAME,cloudflared.exe,DIRECT

  # --- 前置拦截（确保规则集和 DNS 下载可用）---
  - DOMAIN-SUFFIX,jsdelivr.net,节点选择
  - DOMAIN,dns.google,节点选择
  - DOMAIN,dns.google.com,节点选择

