    use:
      - sub
    proxies:
      - 节点选择
      - 自动选择
      - 故障转移
      - DIRECT

  - name: Telegram
    type: select
    icon: "https://cdn.jsdelivr.net/gh/Koolson/Qure@master/IconSet/Color/Telegram.png"
    use:
      - sub
    proxies:
      - 节点选择
      - 自动选择
      - 故障转移
      - DIRECT

  - name: 海外社交
    type: select
    icon: "https://cdn.jsdelivr.net/gh/Koolson/Qure@master/IconSet/Color/Discord.png"
    use:
      - sub
    proxies:
      - 节点选择
      - 自动选择
      - 故障转移
      - DIRECT

  - name: 流媒体
    type: select
    icon: "https://cdn.jsdelivr.net/gh/Koolson/Qure@master/IconSet/Color/ForeignMedia.png"
    use:
      - sub
    proxies:
      - 节点选择
      - 自动选择
      - 故障转移
      - DIRECT

  - name: Google
    type: select
    icon: "https://cdn.jsdelivr.net/gh/Koolson/Qure@master/IconSet/Color/Google.png"
    use:
      - sub
    proxies:
      - 节点选择
      - 自动选择
      - 故障转移
      - DIRECT

  - name: 开发工具
    type: select
    icon: "https://cdn.jsdelivr.net/gh/Koolson/Qure@master/IconSet/Color/GitHub.png"
    use:
      - sub
    proxies:
      - 节点选择
      - 自动选择
      - 故障转移
      - DIRECT

  - name: 海外游戏
    type: select
    icon: "https://cdn.jsdelivr.net/gh/Koolson/Qure@master/IconSet/Color/Steam.png"
    use:
      - sub
    proxies:
      - 节点选择
