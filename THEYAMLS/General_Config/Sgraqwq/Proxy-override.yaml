  gfw:
    type: http
    behavior: domain
    format: mrs
    url: https://fastly.jsdelivr.net/gh/MetaCubeX/meta-rules-dat@meta/geo/geosite/gfw.mrs
    path: ./ruleset/meta-gfw.mrs
    interval: 86445
    proxy: DIRECT

# ================================================================
#  分流规则
# ================================================================

rules:
  # --- 微信小程序基础设施（anti-ad 规则集可能误伤 *.wxs.qq.com，优先放行）---
  - DOMAIN-SUFFIX,wxs.qq.com,DIRECT
  - DOMAIN-SUFFIX,wx.qlogo.cn,DIRECT
  - DOMAIN-SUFFIX,servicewechat.com,DIRECT
  - DOMAIN-SUFFIX,mp.weixin.qq.com,DIRECT
  - DOMAIN,school-wx.qshnhealth.com,DIRECT

  # --- 火山引擎 APM / 极光推送（anti-ad 规则集误伤，米哈游等国服游戏基础设施）---
  - DOMAIN,apmplus.volces.com,DIRECT
  - DOMAIN-SUFFIX,jpush.io,DIRECT
  - DOMAIN-SUFFIX,jpush.cn,DIRECT
  - DOMAIN,easytomessage.com,DIRECT
  # 友盟推送/错误日志（国内大量 App 依赖）
  - DOMAIN,msg.umeng.com,DIRECT
  - DOMAIN,msg.umengcloud.com,DIRECT
  - DOMAIN,errlog.umeng.com,DIRECT
  # 归因 SDK（Adjust/AppsFlyer，国内 App 广泛集成，被广告规则误伤）
  - DOMAIN,app.adjust.com,DIRECT
  - DOMAIN,app.appsflyer.com,DIRECT
  # 公共 CDN
  - DOMAIN-SUFFIX,baomitu.com,DIRECT
  - DOMAIN-SUFFIX,bootcss.com,DIRECT
  - DOMAIN-SUFFIX,staticfile.org,DIRECT
  - DOMAIN-SUFFIX,upaiyun.com,DIRECT
  # Android 系统服务（被墙，走代理；广告规则可能误伤需前置放行）
  - DOMAIN-SUFFIX,mtalk.google.com,Google
  - DOMAIN,clientservices.googleapis.com,Google
  - DOMAIN,update.googleapis.com,Google
  - DOMAIN-SUFFIX,dl.google.com,Google
  - DOMAIN-SUFFIX,dl.l.google.com,Google

  # --- 广告拦截 ---
  - GEOSITE,category-ads-all,广告拦截
  - RULE-SET,anti-ad,广告拦截

  # --- QUIC 阻断（微软/苹果/YouTube/Google 豁免，其余非中国站点 REJECT）---
  - AND,((DST-PORT,443),(NETWORK,UDP),(RULE-SET,microsoft)),微软
  - AND,((DST-PORT,443),(NETWORK,UDP),(RULE-SET,apple)),苹果
  - AND,((DST-PORT,443),(NETWORK,UDP),(GEOSITE,youtube)),YouTube
  - AND,((DST-PORT,443),(NETWORK,UDP),(GEOSITE,google)),Google
  - AND,((DST-PORT,443),(NETWORK,UDP),(NOT,((RULE-SET,cn_sites)))),REJECT

  # --- 局域网 / 私有网络 ---
  - DST-PORT,7680,REJECT
  - GEOSITE,private,DIRECT
  - GEOIP,private,DIRECT,no-resolve
  - DOMAIN,localhost,DIRECT
  - DOMAIN-SUFFIX,local,DIRECT

  # --- 进程名直连（仅 Windows 平台 TUN 模式生效）---
  - PROCESS-NAME,WinStore.App.exe,DIRECT
  - PROCESS-NAME,WinStore.Mobile.exe,DIRECT
  - PROCESS-NAME,Weixin.exe,DIRECT
  - PROCESS-NAME,WeChat.exe,DIRECT
  - PROCESS-NAME,WeChatAppEx.exe,DIRECT
  - PROCESS-NAME,QQ.exe,DIRECT
  - PROCESS-NAME,SunloginClient.exe,DIRECT
  - PROCESS-NAME,ToDesk.exe,DIRECT
  - PROCESS-NAME,ToDesk_Service.exe,DIRECT
  - PROCESS-NAME,rustdesk.exe,DIRECT
