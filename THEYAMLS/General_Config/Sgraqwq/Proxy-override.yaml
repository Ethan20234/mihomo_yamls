# FlClash / Mihomo 通用覆写配置
# 版本：v3.0 (2026-05-21)
# 架构：3 基础设施组 + 13 业务策略组 + 9 rule-providers + 全加密 DNS
# 适用：Mihomo / Clash.Meta 内核；任何机场订阅
# 对应 JS 覆写脚本：proxy-override.js
#
# === 导入方法 ===
#
# 将本文件作为 Mihomo 配置文件加载（或与现有配置合并）。
# 必须将 proxy-providers.sub.url 替换为你的机场订阅链接。
#
# ================================================================

# ================================================================
#  全局参数
# ================================================================

unified-delay: true
tcp-concurrent: true
find-process-mode: strict
keep-alive-idle: 30
keep-alive-interval: 15

profile:
  store-selected: true
  store-fake-ip: false

geox-url:
  geosite: https://fastly.jsdelivr.net/gh/MetaCubeX/meta-rules-dat@release/geosite.dat
  geoip: https://fastly.jsdelivr.net/gh/MetaCubeX/meta-rules-dat@release/geoip.dat
  geoip-mmdb: https://fastly.jsdelivr.net/gh/MetaCubeX/meta-rules-dat@release/geoip.metadb

# ================================================================
#  端口 / SOCKS / 混合入站
# ================================================================

mixed-port: 7890
allow-lan: false
mode: rule
log-level: info
external-controller: 127.0.0.1:9090

# ================================================================
#  Sniffer 嗅探
# ================================================================

sniffer:
  enable: true
  force-dns-mapping: true
  parse-pure-ip: true
  override-destination: true
  sniff:
    TLS:
      ports: [443, 8443]
    HTTP:
      ports: [80, 8080-8880]
    QUIC:
      ports: [443, 8443]
  force-domain:
    - +.netlify.app
    - +.vercel.app
    - +.workers.dev
  skip-domain:
    - +.mijia.cloud
    - +.oray.com
    - +.oray.net
    - +.apple.com

# ================================================================
#  DNS 全加密
# ================================================================

dns:
  enable: true
  listen: 127.0.0.1:1053
  ipv6: false
  enhanced-mode: fake-ip
  fake-ip-range: 198.18.0.1/16
  fake-ip-filter:
    - +.lan
    - +.local
    - +.localhost
    - +.direct
    - +.msftconnecttest.com
    - +.msftncsi.com
    - +.baidu.com
    - +.bilibili.com
    - +.bing.com
    - +.chiphell.com
    - +.oray.com
    - +.sunlogin.com
    - +.todesk.com
    - +.rustdesk.com
    - +.teamviewer.com
    - +.anydesk.com
    - +.tailscale.com
    - +.zerotier.com
    - +.nvidia.com
    - +.ntp.org
    - +.pool.ntp.org
    - +.time.apple.com
    - +.time.google.com
    - +.time.nist.gov
    - time.windows.com
    - ip.cip.cc
    - captive.apple.com
    - connectivitycheck.gstatic.com
    - id6.me
    - localhost.ptlogin2.qq.com
    - +.cmpassport.com
    - +.mcdn.bilivideo.cn
    - +.battlenet.com.cn
    - +.wotgame.cn
    - +.wggames.cn
    - +.wowsgame.cn
  default-nameserver:
    - tls://223.5.5.5
    - tls://223.6.6.6
  proxy-server-nameserver:
    - https://doh.pub/dns-query
    - tls://223.5.5.5
  direct-nameserver:
    - https://dns.alidns.com/dns-query
  nameserver-policy:
    geosite:cn,geolocation-cn,bilibili,biliintl:
      - https://dns.alidns.com/dns-query
      - https://doh.pub/dns-query
      - tls://223.5.5.5
      - tls://223.6.6.6
    aistudio.google.com:
      - https://dns.cloudflare.com/dns-query
      - https://dns.google/dns-query
  nameserver:
    - https://dns.cloudflare.com/dns-query
    - https://dns.google/dns-query
  respect-rules: true
  direct-nameserver-follow-policy: true

# ================================================================
#  代理订阅（proxy-provider）
# ================================================================
#  替换 sub.url 为你的机场订阅链接
#  如机场订阅本身就是 Clash 兼容格式，type 保持 http
#  如机场提供 SS/SSR/Vmess 链接，需后端转换后使用
#
#  proxy: DIRECT 说明：
#  订阅链接下载走直连，避免"首次启动节点还没下载 → 却需节
#  点去拉订阅"的鸡生蛋死循环。大部分机场订阅域名直连可访问。
#  如果你的机场订阅域名被墙，改为 proxy: 节点选择，但首
#  次启动需要先通过其他方式获取节点（如手动导入一次缓存文件）。
#
#  节点名过滤说明：
#  Mihomo 的 RE2 正则引擎不支持负向零宽断言 (?!...)，
#  无法像 JS 覆写脚本那样在 YAML 中排除"剩余/到期/官网/免费"等
#  信息节点。如果订阅含大量信息节点，建议：
#    1) 使用 proxy-override.js 覆写脚本版本（支持 isInfoNode 过滤）
#    2) 或在机场侧清理无效节点
#    3) 或手动编辑 proxy-providers/sub.yaml 缓存文件删除信息节点行

proxy-providers:
  sub:
    type: http
    url: "https://你的机场订阅链接"
    path: ./proxy-providers/sub.yaml
    # 更新时间，单位为秒，建议设置为 12 小时以上，避免过于频繁地下载订阅
    # 目前为 24 小时（86400 秒），根据需要调整
    interval: 86400
    proxy: DIRECT
    health-check:
      enable: true
      url: http://www.gstatic.com/generate_204
      interval: 300
      lazy: true
      timeout: 5000

# ================================================================
#  连接代理（手动添加的独立节点，可选）
# ================================================================

proxies: []
  # - name: "手动节点示例"
  #   type: ss
  #   server: example.com
  #   port: 443
  #   cipher: aes-256-gcm
  #   password: "your-password"

# ================================================================
#  策略组
# ================================================================

proxy-groups:
  # --- 基础设施组（3 个）---

  - name: 节点选择
    type: select
    icon: "https://cdn.jsdelivr.net/gh/Koolson/Qure@master/IconSet/Color/Available.png"
    use:
      - sub
    proxies:
      - 自动选择
      - 故障转移
      - DIRECT

  - name: 自动选择
    type: url-test
    icon: "https://cdn.jsdelivr.net/gh/Koolson/Qure@master/IconSet/Color/Auto.png"
    url: http://www.gstatic.com/generate_204
    interval: 300
    tolerance: 150
    lazy: true
    use:
      - sub
    # filter 可选：限制参与测速的节点名正则（RE2 语法）
    # filter: ".*"

  - name: 故障转移
    type: fallback
    icon: "https://cdn.jsdelivr.net/gh/Koolson/Qure@master/IconSet/Color/Round_Robin.png"
    url: http://www.gstatic.com/generate_204
    interval: 300
    lazy: true
    use:
      - sub

  # --- 业务策略组（13 个）---

  - name: AI
    type: select
    icon: "https://cdn.jsdelivr.net/gh/Koolson/Qure@master/IconSet/Color/ChatGPT.png"
    use:
      - sub
    proxies:
      - 节点选择
      - 自动选择
      - 故障转移
      - DIRECT

  - name: YouTube
